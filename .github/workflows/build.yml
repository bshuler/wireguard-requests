name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install linters
        run: pip install black ruff mypy
      - name: Check Python formatting
        run: black --check python/ tests/
      - name: Lint Python
        run: ruff check python/ tests/
      - name: Rust formatting
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check
      - name: Rust clippy
        run: cargo clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create venv and install deps
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest pytest-asyncio
        if: runner.os != 'Windows'
      - name: Create venv and install deps (Windows)
        run: |
          python -m venv .venv
          .venv\Scripts\pip install maturin pytest pytest-asyncio
        if: runner.os == 'Windows'
      - name: Build extension
        run: .venv/bin/maturin develop --manifest-path rust/Cargo.toml
        if: runner.os != 'Windows'
      - name: Build extension (Windows)
        run: .venv\Scripts\maturin develop --manifest-path rust/Cargo.toml
        if: runner.os == 'Windows'
      - name: Run unit tests
        run: .venv/bin/pytest tests/unit -v
        if: runner.os != 'Windows'
      - name: Run unit tests (Windows)
        run: .venv\Scripts\pytest tests/unit -v
        if: runner.os == 'Windows'

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Rust tests
        run: cargo test --manifest-path rust/Cargo.toml

  integration:
    runs-on: ubuntu-latest
    needs: [test, rust-test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest pytest-asyncio requests httpx
          .venv/bin/maturin develop --manifest-path rust/Cargo.toml
      - name: Start WireGuard test peer
        run: docker compose -f tests/integration/docker-compose.yml up -d
      - name: Wait for peer
        run: sleep 5
      - name: Run integration tests
        run: .venv/bin/pytest tests/integration -v -m integration
      - name: Stop WireGuard test peer
        if: always()
        run: docker compose -f tests/integration/docker-compose.yml down
