# WireGuard test peer for integration testing.
#
# Starts a WireGuard server with an HTTP server behind it.
# The client (our library) connects to the WireGuard peer and
# makes HTTP requests to the HTTP server through the tunnel.
#
# Network:
#   WireGuard server: 10.13.13.1/24, endpoint: localhost:51820
#   Test client:      10.13.13.2/24
#   HTTP server:      accessible at 10.13.13.1:8080 through tunnel

services:
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: wg-test-server
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - SERVERURL=127.0.0.1
      - SERVERPORT=51820
      - PEERS=testclient
      - PEERDNS=auto
      - INTERNAL_SUBNET=10.13.13.0
    volumes:
      - ./wg-config:/config
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped

  httpserver:
    image: python:3.12-slim
    container_name: wg-test-http
    network_mode: "service:wireguard"
    command:
      - python
      - -c
      - |
        from http.server import HTTPServer, BaseHTTPRequestHandler
        import json

        class Handler(BaseHTTPRequestHandler):
            def do_GET(self):
                self.send_response(200)
                self.send_header('Content-Type', 'application/json')
                self.end_headers()
                body = json.dumps({
                    'status': 'ok',
                    'path': self.path,
                    'tunnel': 'wireguard',
                    'client_address': self.client_address[0],
                })
                self.wfile.write(body.encode())

            def log_message(self, format, *args):
                pass

        HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
    depends_on:
      - wireguard

  udpserver:
    image: python:3.12-slim
    container_name: wg-test-udp
    network_mode: "service:wireguard"
    command:
      - python
      - -c
      - |
        import socket
        s = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
        s.bind(('0.0.0.0', 9999))
        print('UDP echo server ready on port 9999', flush=True)
        while True:
            data, addr = s.recvfrom(4096)
            s.sendto(b'ECHO:' + data, addr)
    depends_on:
      - wireguard

  dnsserver:
    image: python:3.12-slim
    container_name: wg-test-dns
    network_mode: "service:wireguard"
    command:
      - python
      - -c
      - |
        import socket, struct

        def build_a_response(query_data, answer_ip):
            tid = query_data[:2]
            flags = b'\x81\x80'
            qdcount = b'\x00\x01'
            ancount = b'\x00\x01'
            nscount = b'\x00\x00'
            arcount = b'\x00\x00'
            question = query_data[12:]
            qname_end = question.index(b'\x00') + 1
            qsection = question[:qname_end + 4]
            qtype = struct.unpack('!H', question[qname_end:qname_end+2])[0]
            if qtype != 1:
                return tid + b'\x81\x83' + qdcount + b'\x00\x00' + nscount + arcount + qsection
            answer = b'\xc0\x0c'
            answer += b'\x00\x01\x00\x01'
            answer += b'\x00\x00\x00\x3c'
            ip_bytes = socket.inet_aton(answer_ip)
            answer += struct.pack('!H', 4) + ip_bytes
            return tid + flags + qdcount + ancount + nscount + arcount + qsection + answer

        def extract_qname(data):
            pos = 12
            labels = []
            while data[pos] != 0:
                length = data[pos]
                pos += 1
                labels.append(data[pos:pos+length].decode())
                pos += length
            return '.'.join(labels)

        RECORDS = {'test.wg.local': '10.13.13.1'}

        s = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
        s.bind(('0.0.0.0', 53))
        print('DNS server ready on port 53', flush=True)
        while True:
            data, addr = s.recvfrom(512)
            try:
                name = extract_qname(data).lower()
                if name in RECORDS:
                    resp = build_a_response(data, RECORDS[name])
                    s.sendto(resp, addr)
                else:
                    resp = data[:2] + b'\x81\x83' + data[4:]
                    s.sendto(resp, addr)
            except Exception as e:
                print(f'DNS error: {e}', flush=True)
    depends_on:
      - wireguard

  httpsserver:
    image: python:3.12-slim
    container_name: wg-test-https
    network_mode: "service:wireguard"
    command:
      - python
      - -c
      - |
        import http.server, ssl, json, subprocess

        subprocess.run([
            'openssl', 'req', '-x509', '-newkey', 'rsa:2048',
            '-keyout', '/tmp/key.pem', '-out', '/tmp/cert.pem',
            '-days', '1', '-nodes', '-subj', '/CN=10.13.13.1'
        ], check=True, capture_output=True)

        class Handler(http.server.BaseHTTPRequestHandler):
            def do_GET(self):
                self.send_response(200)
                self.send_header('Content-Type', 'application/json')
                self.end_headers()
                self.wfile.write(json.dumps({
                    'status': 'ok',
                    'tls': True,
                    'path': self.path,
                }).encode())
            def log_message(self, *args):
                pass

        server = http.server.HTTPServer(('0.0.0.0', 8443), Handler)
        ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
        ctx.load_cert_chain('/tmp/cert.pem', '/tmp/key.pem')
        server.socket = ctx.wrap_socket(server.socket, server_side=True)
        print('HTTPS server ready on port 8443', flush=True)
        server.serve_forever()
    depends_on:
      - wireguard

  natpmpserver:
    image: python:3.12-slim
    container_name: wg-test-natpmp
    network_mode: "service:wireguard"
    command:
      - python
      - -c
      - |
        import socket, struct, time

        EXTERNAL_IP = "203.0.113.42"
        START_TIME = time.monotonic()

        def get_epoch():
            return int(time.monotonic() - START_TIME)

        def handle_request(data):
            if len(data) < 2:
                return None
            ver, opcode = struct.unpack("!BB", data[:2])
            if ver != 0:
                if opcode in (1, 2):
                    return struct.pack("!BBHIHHI", 0, opcode + 128, 1, get_epoch(), 0, 0, 0)
                return struct.pack("!BBHI", 0, opcode + 128, 1, get_epoch()) + b'\x00\x00\x00\x00'
            if opcode == 0:
                ip_bytes = socket.inet_aton(EXTERNAL_IP)
                return struct.pack("!BBHI", 0, 128, 0, get_epoch()) + ip_bytes
            elif opcode in (1, 2):
                if len(data) < 12:
                    return None
                _, _, internal_port, ext_port, lifetime = struct.unpack("!BB2xHHI", data[:12])
                if lifetime == 0 and ext_port == 0:
                    assigned_port = 0
                else:
                    assigned_port = ext_port if ext_port != 0 else internal_port + 1000
                return struct.pack("!BBHIHHI", 0, opcode + 128, 0, get_epoch(), internal_port, assigned_port, lifetime)
            return struct.pack("!BBHI", 0, opcode + 128, 5, get_epoch()) + b'\x00\x00\x00\x00'

        s = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
        s.bind(('0.0.0.0', 5351))
        print('NAT-PMP server ready on port 5351', flush=True)
        while True:
            data, addr = s.recvfrom(512)
            resp = handle_request(data)
            if resp:
                s.sendto(resp, addr)
    depends_on:
      - wireguard
